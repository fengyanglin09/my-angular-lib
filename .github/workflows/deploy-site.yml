#this will deploy both my-app and Storybook to GitHub Pages.

name: Deploy app + Storybook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'my-angular-lib-workspace/projects/my-app/**'
      - 'my-angular-lib-workspace/projects/my-lib/**'
      - 'my-angular-lib-workspace/package.json'
      - 'my-angular-lib-workspace/package-lock.json'
      - 'my-angular-lib-workspace/angular.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-angular-lib-workspace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: my-angular-lib-workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Angular app
        run: npm run build:app:pages

      - name: Build Storybook
        run: npm run build:storybook

      - name: Combine app and Storybook
        run: |
          rm -rf site
          mkdir -p site/storybook

          cp -R dist/my-app/browser/* site/
          cp -R dist/storybook/my-lib/* site/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: my-angular-lib-workspace/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
