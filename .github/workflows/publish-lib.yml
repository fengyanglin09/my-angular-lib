name: Release library

on:
  push:
    branches: [main]
    paths:
      - 'my-angular-lib-workspace/projects/my-lib/**'
      - 'my-angular-lib-workspace/.changeset/**'
      - 'my-angular-lib-workspace/package.json'
      - 'my-angular-lib-workspace/package-lock.json'
      - 'my-angular-lib-workspace/angular.json'
      - '.github/workflows/publish-lib.yml'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    defaults:
      run:
        working-directory: my-angular-lib-workspace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: my-angular-lib-workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          cwd: my-angular-lib-workspace
          version: npm run version-packages
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
