name: Publish library

on:
  push:
    branches: [main]
    paths:
      - 'my-angular-lib-workspace/projects/my-lib/**'
      - 'my-angular-lib-workspace/package.json'
      - 'my-angular-lib-workspace/package-lock.json'
      - 'my-angular-lib-workspace/angular.json'
      - '.github/workflows/publish-lib.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: my-angular-lib-workspace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: my-angular-lib-workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish package to npm
        run: npm publish --access public
        working-directory: my-angular-lib-workspace/dist/my-lib
