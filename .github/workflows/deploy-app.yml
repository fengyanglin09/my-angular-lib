name: Deploy Angular app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'my-angular-lib-workspace/projects/my-app/**'
      - 'my-angular-lib-workspace/package.json'
      - 'my-angular-lib-workspace/package-lock.json'
      - 'my-angular-lib-workspace/angular.json'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-angular-lib-workspace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-angular-lib-workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Angular app
        run: npx ng build my-app --configuration production --base-href /YOUR-REPO-NAME/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: my-angular-lib-workspace/dist/my-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
