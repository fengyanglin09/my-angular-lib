<article class="heavy-report">
  <header>
    <p class="eyebrow">Deferred Component</p>
    <h3>{{ reportName() }}</h3>
  </header>

  <div class="report-total">
    <span>Total</span>
    <strong>{{ total() }}</strong>
  </div>

  <div class="report-grid">
    @for (row of rows(); track row.label) {
      <div>
        <span>{{ row.label }}</span>
        <strong>{{ row.value }}</strong>
      </div>
    }
  </div>
</article>
