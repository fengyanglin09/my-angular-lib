<div class="priority-picker" role="group" aria-label="Priority">
  @for (option of options; track option.value) {
    <button
      type="button"
      [class.priority-picker__option--selected]="selectedPriority() === option.value"
      [disabled]="disabled()"
      (blur)="markTouched()"
      (click)="choosePriority(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
